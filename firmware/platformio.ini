; ESP32-C3 Telegram Calendar Bot — Phase 1: Echo bot
[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

; Filesystem for storing Google service account key (Phase 2+)
board_build.filesystem = littlefs

lib_deps =
    ; Telegram Bot API client for Arduino
    ; https://github.com/witnessmenow/Universal-Arduino-Telegram-Bot
    https://github.com/witnessmenow/Universal-Arduino-Telegram-Bot.git
    ; JSON parsing with filtering to minimise RAM usage
    bblanchon/ArduinoJson @ ^7.2.0

build_flags =
    -DCORE_DEBUG_LEVEL=0
    ; Reduce mbedTLS I/O buffer from 16KB default to 4KB each.
    ; Telegram responses are small; this saves ~24KB of heap.
    -DCONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=4096
    -DCONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096
    ; Increase loopTask stack: default 8192 is too small for TLS (mbedTLS ECC
    ; handshake needs ~6KB of stack alone). 16KB gives comfortable headroom.
    -DARDUINO_LOOP_STACK_SIZE=16384

; Host-based unit tests (date parser, commands — Phase 3)
[env:native]
platform = native
build_flags = -std=c++17
